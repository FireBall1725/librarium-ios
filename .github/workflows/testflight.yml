name: TestFlight

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    name: Build & Upload to TestFlight
    runs-on: macos-26

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_26.4.app

      # Derive CFBundleShortVersionString from the tag (v26.4.1 -> 26.4.1)
      # and set CFBundleVersion to today's date in DDMMYY form (UTC) so the
      # build number is self-describing — you can read "when was this built?"
      # off the TestFlight entry at a glance.
      - name: Set version and build number
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "MARKETING_VERSION=$VERSION" >> $GITHUB_ENV
          echo "BUILD_NUMBER=$(date -u +%d%m%y)" >> $GITHUB_ENV

      # Import the distribution certificate into a temporary keychain so
      # xcodebuild can sign the archive without touching the system keychain.
      - name: Install distribution certificate
        env:
          CERTIFICATE_BASE64: ${{ secrets.CERTIFICATE_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/signing.keychain-db

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          echo -n "$CERTIFICATE_BASE64" | base64 --decode -o "$RUNNER_TEMP/cert.p12"
          security import "$RUNNER_TEMP/cert.p12" \
            -P "$CERTIFICATE_PASSWORD" \
            -t cert -f pkcs12 \
            -k "$KEYCHAIN_PATH" \
            -T /usr/bin/codesign \
            -T /usr/bin/security

          # Grant codesign access to the imported private key without an
          # interactive prompt. Without this, codesign sees the cert but
          # can't reach the key, and Xcode reports "No signing certificate
          # ... with a private key was found".
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" \
            "$KEYCHAIN_PATH"

          security list-keychain -d user -s "$KEYCHAIN_PATH"

      # The App Store Connect API key lets xcodebuild fetch provisioning profiles
      # automatically (-allowProvisioningUpdates) and lets altool upload the IPA.
      - name: Install App Store Connect API key
        env:
          ASC_PRIVATE_KEY: ${{ secrets.ASC_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          echo -n "$ASC_PRIVATE_KEY" \
            > ~/.appstoreconnect/private_keys/AuthKey_${{ secrets.ASC_KEY_ID }}.p8

      - name: Archive
        run: |
          xcodebuild archive \
            -project Librarium.xcodeproj \
            -scheme Librarium \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath "$RUNNER_TEMP/Librarium.xcarchive" \
            MARKETING_VERSION=${{ env.MARKETING_VERSION }} \
            CURRENT_PROJECT_VERSION=${{ env.BUILD_NUMBER }} \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$HOME/.appstoreconnect/private_keys/AuthKey_${{ secrets.ASC_KEY_ID }}.p8" \
            -authenticationKeyID "${{ secrets.ASC_KEY_ID }}" \
            -authenticationKeyIssuerID "${{ secrets.ASC_ISSUER_ID }}"

      - name: Export IPA
        run: |
          xcodebuild -exportArchive \
            -archivePath "$RUNNER_TEMP/Librarium.xcarchive" \
            -exportPath "$RUNNER_TEMP/export" \
            -exportOptionsPlist ExportOptions.plist \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$HOME/.appstoreconnect/private_keys/AuthKey_${{ secrets.ASC_KEY_ID }}.p8" \
            -authenticationKeyID "${{ secrets.ASC_KEY_ID }}" \
            -authenticationKeyIssuerID "${{ secrets.ASC_ISSUER_ID }}"

      - name: Upload to TestFlight
        run: |
          xcrun altool --upload-app \
            --type ios \
            --file "$RUNNER_TEMP/export/Librarium.ipa" \
            --apiKey "${{ secrets.ASC_KEY_ID }}" \
            --apiIssuer "${{ secrets.ASC_ISSUER_ID }}"

      # Always clean up the temporary keychain, even if a previous step failed
      - name: Clean up keychain
        if: always()
        run: security delete-keychain "$RUNNER_TEMP/signing.keychain-db" 2>/dev/null || true
