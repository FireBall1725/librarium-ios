name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump type"
        required: true
        default: "auto"
        type: choice
        options:
          - auto    # next revision in current YY.MM (rolls to .0 on month change)
          - major   # force YY.MM.0 from today's date
      dry-run:
        description: "Compute the version but don't tag, push, or publish"
        required: false
        default: false
        type: boolean

permissions:
  contents: write
  actions: write   # needed for `gh workflow run testflight.yml` dispatch

jobs:
  release:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      next_dev: ${{ steps.version.outputs.next_dev }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Compute next version
        id: version
        env:
          BUMP: ${{ inputs.bump }}
        run: |
          set -euo pipefail
          YY=$(date -u +%y)
          MM=$(date -u +%-m)
          PREFIX="${YY}.${MM}"

          if [ "$BUMP" = "major" ]; then
            REV=0
          else
            LAST=$(git tag --list "v${PREFIX}.*" | sort -V | tail -n1 || true)
            if [ -z "$LAST" ]; then
              REV=0
            else
              LAST_REV=${LAST##*.}
              REV=$((LAST_REV + 1))
            fi
          fi

          VERSION="${PREFIX}.${REV}"
          # Per the workspace versioning convention (CLAUDE.md): local /
          # CI dev builds carry the literal `YY.M.DEV` — not the legacy
          # `YY.M.{R+1}-dev` suffix form. Debug bumps back to .DEV after
          # every release; the Release config stays pinned at $VERSION.
          NEXT_DEV="${PREFIX}.DEV"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "next_dev=$NEXT_DEV" >> "$GITHUB_OUTPUT"
          echo "Releasing version: $VERSION"

      # The pbxproj has two MARKETING_VERSION lines (Debug and Release). Both get set to
      # the release version at tag time; after tagging, Debug bumps back to the next -dev.
      - name: Update MARKETING_VERSION (release — both configs)
        run: |
          set -euo pipefail
          VERSION="${{ steps.version.outputs.version }}"
          sed -i -E "s/MARKETING_VERSION = [^;]+;/MARKETING_VERSION = ${VERSION};/g" Librarium.xcodeproj/project.pbxproj
          grep -n "MARKETING_VERSION" Librarium.xcodeproj/project.pbxproj

      - name: Commit + tag release
        if: ${{ inputs.dry-run == false }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          git add Librarium.xcodeproj/project.pbxproj
          git commit -m "release: ${VERSION}"
          git tag "v${VERSION}"

      # After tagging, only the Debug config goes back to -dev. Release stays pinned at
      # the numeric version until the next release workflow run.
      - name: Bump Debug MARKETING_VERSION to next -dev
        if: ${{ inputs.dry-run == false }}
        run: |
          set -euo pipefail
          NEXT_DEV="${{ steps.version.outputs.next_dev }}"
          python3 - <<PY
          import re, pathlib, sys
          p = pathlib.Path("Librarium.xcodeproj/project.pbxproj")
          text = p.read_text()

          # An XCBuildConfiguration's opening line looks like
          #   <UUID> /* Debug */ = {
          # and the object contains a nested "buildSettings = { ... };" block,
          # so we can't split on the first "};" — we need proper brace matching.
          # A pbxproj typically has multiple Debug blocks (one per target/project),
          # so iterate and rewrite MARKETING_VERSION wherever it appears.
          total = 0
          out = []
          cursor = 0
          for m in re.finditer(r'/\* Debug \*/ = \{', text):
              start = m.start()
              depth = 0
              end = None
              for i in range(m.end() - 1, len(text)):
                  c = text[i]
                  if c == '{':
                      depth += 1
                  elif c == '}':
                      depth -= 1
                      if depth == 0:
                          end = i + 1
                          break
              if end is None:
                  sys.exit("Debug block never closes")
              block = text[start:end]
              new_block, n = re.subn(
                  r'MARKETING_VERSION\s*=\s*[^;]+;',
                  'MARKETING_VERSION = "${NEXT_DEV}";',
                  block,
              )
              total += n
              out.append(text[cursor:start])
              out.append(new_block)
              cursor = end
          out.append(text[cursor:])
          if total == 0:
              sys.exit("MARKETING_VERSION not found in any Debug block")
          p.write_text("".join(out))
          PY
          grep -n "MARKETING_VERSION" Librarium.xcodeproj/project.pbxproj
          git add Librarium.xcodeproj/project.pbxproj
          git commit -m "chore: bump Debug to ${NEXT_DEV}"

      - name: Push commits and tag
        if: ${{ inputs.dry-run == false }}
        run: |
          git push origin HEAD:main
          git push origin "v${{ steps.version.outputs.version }}"

      - name: Create GitHub Release
        if: ${{ inputs.dry-run == false }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          generate_release_notes: true

      # Tag pushes performed with the default GITHUB_TOKEN don't trigger
      # dependent `push:` workflows, so `testflight.yml` won't auto-fire off
      # the tag we just pushed. workflow_dispatch is an exception to that
      # rule, so we kick it off explicitly here with --ref pointed at the
      # newly-created tag.
      - name: Dispatch TestFlight workflow
        if: ${{ inputs.dry-run == false }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh workflow run testflight.yml \
            --ref "v${{ steps.version.outputs.version }}" \
            --repo "${{ github.repository }}"
